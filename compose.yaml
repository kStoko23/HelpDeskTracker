services:
  postgres:
    image: postgres:18
    container_name: hdtracker-postgres
    environment:
      POSTGRES_DB: hdtracker
      POSTGRES_USER: hdtracker
      POSTGRES_PASSWORD: hdtracker
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hdtracker"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: Api
      dockerfile: Dockerfile
    container_name: hdtracker-api
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__Default=Host=postgres;Port=5432;Database=hdtracker;Username=hdtracker;Password=hdtracker
    depends_on:
      postgres:
        condition: service_healthy



volumes:
  postgres_data:
